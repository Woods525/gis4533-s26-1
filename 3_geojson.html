<body>
    <div class="banner">
        <div class="banner-overlay">
            <h1>Duluth School Attendance Areas</h1>
            <h3>by: Marissa Woods</h3>
            <h5>School attendance area boundaries for Duluth, MN. Each polygon represents a service area for public schools. Data source: Minnesota Department of Education</h5>
        </div>

    <div class="content">
        <div id="map"></div>
    </div>
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
// This creates the map and centers it on Duluth.
// The numbers are latitude, longitude, and zoom level.
// This controls what the map looks like when it first loads.
        const map = L.map('map').setView([46.82, -92.08], 9.5);
// This adds the basemap (background map).
// It shows roads, water, and general location so the data makes sense.
// The tiles load automatically as you move around the map.
        const tiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> | School Attendance Data: Minnesota Department of Education (via MNGeoCommons)'
        }).addTo(map);
// This loads the GeoJSON file with the attendance areas.
// fetch() grabs the file, then we turn it into JSON so Leaflet can use it.
        fetch('duluth_attendance_areas.json')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                L.geoJSON(data, {
                    style: attendanceAreaStyle,
                    onEachFeature: attendanceAreaPopup
                }).addTo(map);
            });
// This runs for each attendance area.
// It grabs the school info and shows it when you click on the area.
            function attendanceAreaPopup(feature, layer) {
                const areaName = feature.properties.ELEM_NAME || 'Unknown area';
                const middleSchool = feature.properties.MIDD_NAME || 'Unknown';
                const highSchool = feature.properties.HIGH_NAME || 'Unknown';
// This builds the popup text using the data from the GeoJSON.
                layer.bindPopup(
                    `<strong>Attendance Area:</strong> ${areaName}<br>` +
                    `<strong>Middle School:</strong> ${middleSchool}<br>` +
                    `<strong>High School:</strong> ${highSchool}`
                );
            }
// This picks a color from a small set of nicer colors.
// This helps avoid super bright/random colors that look messy.
            function getRandomColor() {
                const colors = [
                    '#7DA7D9',
                    '#A3C9A8',
                    '#F2C57C',
                    '#D9A5B3',
                    '#B5A9D6',
                    '#8FB9A8'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
// This controls how each attendance area looks on the map.
// Leaflet runs this for every feature in the dataset.
            function attendanceAreaStyle(feature) {
                return {
                    fillColor: getRandomColor(),
                    weight: 2,
                    opacity: 1,
                    color: 'black',
                    dashArray: '2',
                    fillOpacity: 0.7
                };
                console.log(feature.properties);
            }
        
    </script>
